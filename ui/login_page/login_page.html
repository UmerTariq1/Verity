<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nexora KR - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#005048",
                        "inverse-primary": "#4fdbc8",
                        "tertiary-fixed": "#e9ddff",
                        "background": "#f8f9fb",
                        "on-tertiary-fixed-variant": "#5516be",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "outline": "#6c7a77",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#6d3bd7",
                        "surface-container-highest": "#e1e2e4",
                        "tertiary-container": "#b192ff",
                        "secondary": "#4648d4",
                        "on-primary-container": "#00423b",
                        "tertiary-fixed-dim": "#d0bcff",
                        "primary-fixed": "#71f8e4",
                        "error": "#ba1a1a",
                        "outline-variant": "#bbcac6",
                        "surface-variant": "#e1e2e4",
                        "on-secondary-fixed": "#07006c",
                        "on-secondary-container": "#fffbff",
                        "surface-tint": "#006b5f",
                        "primary-container": "#14b8a6",
                        "on-primary-fixed": "#00201c",
                        "secondary-fixed": "#e1e0ff",
                        "on-tertiary-fixed": "#23005c",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#3c4947",
                        "secondary-fixed-dim": "#c0c1ff",
                        "primary": "#006b5f",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f3f4f6",
                        "inverse-on-surface": "#f0f1f3",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#4700aa",
                        "on-background": "#191c1e",
                        "surface-dim": "#d9dadc",
                        "surface-bright": "#f8f9fb",
                        "on-error": "#ffffff",
                        "surface-container": "#edeef0",
                        "inverse-surface": "#2e3132",
                        "surface": "#f8f9fb",
                        "secondary-container": "#6063ee",
                        "on-secondary-fixed-variant": "#2f2ebe",
                        "primary-fixed-dim": "#4fdbc8",
                        "surface-container-high": "#e7e8ea",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
        .bg-gradient-soft {
            background: radial-gradient(circle at top left, #f3f4f6 0%, #f8f9fb 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-gradient-soft min-h-screen flex items-center justify-center p-6 text-on-surface">
<div class="w-full max-w-md space-y-8">
<!-- Brand Identity -->
<div class="flex flex-col items-center text-center space-y-4">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-2xl flex items-center justify-center shadow-lg transform rotate-3">
<span class="material-symbols-outlined text-white text-4xl" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="space-y-1">
<h1 class="text-3xl font-extrabold tracking-tighter text-on-surface">Nexora KR</h1>
<p class="text-on-surface-variant font-medium tracking-tight">Intelligent Retrieval System</p>
</div>
</div>
<!-- Login Card -->
<div class="surface-container-lowest glass-card rounded-2xl p-8 shadow-2xl shadow-on-surface/5 border border-white/50">
<form id="login-form" class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="email">Email address</label>
<div class="relative group">
<input class="w-full h-12 px-4 rounded-2xl bg-surface-container-low border-0 focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/50" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input (Error State Example) -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<button class="text-xs font-bold text-primary hover:text-primary-container transition-colors" type="button">Forgot password?</button>
</div>
<div class="relative group">
<input class="w-full h-12 px-4 rounded-2xl bg-surface-container-low border-0 focus:ring-2 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<div class="pt-2">
<button id="login-btn" class="w-full h-12 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-2xl flex items-center justify-center gap-3 shadow-md shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-300" type="submit">
<svg id="login-spinner" class="animate-spin h-5 w-5 text-white hidden" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
</svg>
<span id="login-btn-text">Sign in</span>
</button>
</div>
<!-- Error Alert Card -->
<div id="error-card" class="hidden bg-error-container/50 border border-error/10 rounded-2xl p-4 flex items-start gap-3">
<span class="material-symbols-outlined text-error" data-icon="error_outline">error_outline</span>
<div class="space-y-1">
<p class="text-sm font-bold text-on-error-container">Authentication failed</p>
<p id="error-msg" class="text-xs text-on-error-container/80">Please check your password and try again.</p>
</div>
</div>
</form>
</div>
<!-- Footer / Support -->
<div class="flex flex-col items-center gap-4 text-center">
<p class="text-sm text-on-surface-variant">
  Don't have an account?
  <a href="../signup_page/signup_page.html" class="font-bold text-primary hover:text-primary-container transition-colors">Sign up</a>
</p>
<p class="text-xs text-on-surface-variant max-w-[280px]">
  Authorized access only. By signing in, you agree to Nexora KR's Internal Data Policy.
</p>
</div>
</div>
<!-- Decorative Elements (Asymmetric) -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/2 bg-gradient-to-b from-primary/5 to-transparent blur-3xl opacity-50 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/3 bg-gradient-to-t from-tertiary/5 to-transparent blur-3xl opacity-50 pointer-events-none"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  // Already logged in — go straight to dashboard.
  if (localStorage.getItem("verity_token")) {
    window.location.href = "../dashboard/dashboard.html";
    return;
  }

  const form       = document.getElementById("login-form");
  const emailInput = document.getElementById("email");
  const passInput  = document.getElementById("password");
  const loginBtn   = document.getElementById("login-btn");
  const spinner    = document.getElementById("login-spinner");
  const btnText    = document.getElementById("login-btn-text");
  const errorCard  = document.getElementById("error-card");
  const errorMsg   = document.getElementById("error-msg");

  // Password visibility toggle.
  const toggleBtn = passInput.parentElement.querySelector("button[type='button']");
  if (toggleBtn) {
    toggleBtn.addEventListener("click", () => {
      const isHidden = passInput.type === "password";
      passInput.type = isHidden ? "text" : "password";
      const icon = toggleBtn.querySelector(".material-symbols-outlined");
      if (icon) icon.textContent = isHidden ? "visibility" : "visibility_off";
    });
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    // Loading state.
    spinner.classList.remove("hidden");
    btnText.textContent = "Signing in…";
    loginBtn.disabled = true;
    errorCard.classList.add("hidden");

    try {
      const res = await fetch("http://localhost:8000/api/v1/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: emailInput.value.trim(),
          password: passInput.value,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || "Authentication failed. Check your credentials.");
      }

      const data = await res.json();

      localStorage.setItem("verity_token", data.access_token);
      localStorage.setItem(
        "verity_user",
        JSON.stringify({ name: data.name, role: data.role, user_id: data.user_id })
      );

      window.location.href = "../dashboard/dashboard.html";

    } catch (err) {
      errorMsg.textContent = err.message;
      errorCard.classList.remove("hidden");
      spinner.classList.add("hidden");
      btnText.textContent = "Sign in";
      loginBtn.disabled = false;
    }
  });
});
</script>
</body></html>
